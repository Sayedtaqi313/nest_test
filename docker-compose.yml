services:
  nest_app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000'
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
  postgres:
    image: postgres:17-alpine

    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=nestdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  nginx:
    image: nginx:alpine

    ports:
      - '80:80'

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - nest_app

volumes:
  postgres_data:
